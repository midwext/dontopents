<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tex Totten</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0b;
color:#f5f5f5;
font-family:"Space Grotesk",sans-serif;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:80px 20px;
}

h1{
font-size:4rem;
letter-spacing:2px;
margin-bottom:40px;
}

.button{
display:inline-block;
padding:14px 36px;
border-radius:40px;
border:1px solid #2f2f2f;
background:#141414;
color:#fff;
text-decoration:none;
font-size:1rem;
margin-bottom:60px;
transition:.25s;
}

.button:hover{
background:#fff;
color:#000;
transform:translateY(-2px);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.grid img{
width:100%;
border-radius:10px;
background:#111;
padding:10px;
transition:.3s;
}

.grid img:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>Tex Totten</h1>

<a class="button" href="https://linktr.ee/tex23">My Stuff</a>

<div class="grid">

<img src="le-male-elixir.jpg">
<img src="bleu-de-chanel.jpg">
<img src="moyu-logo.png">

</div>

</div>

</body>
</html>
