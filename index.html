<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tex totten</title>

<style>
/* Body fade-in */
body {
  margin: 0;
  background: #0b0b0b;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  opacity: 0;
  animation: fadein 1s forwards;
}

@keyframes fadein {
  to { opacity: 1; }
}

/* Container */
.container {
  max-width: 600px;
  text-align: left;
}

/* Title */
h1 {
  font-weight: normal;
  font-size: 2.5rem;
  margin-bottom: 40px;
  text-transform: lowercase;
}

/* Quote fade-in */
.quote {
  font-size: 0.95rem;
  opacity: 0;
  line-height: 1.6;
  margin-top: 40px;
  animation: fadeQuote 1s forwards;
  animation-delay: 1s; /* appears after title */
}

@keyframes fadeQuote {
  to { opacity: 0.75; }
}

/* Linktree button */
.button {
  display: inline-block;
  padding: 10px 20px;
  border: 1px solid #fff;
  border-radius: 4px;
  text-decoration: none;
  color: #fff;
  margin-bottom: 20px;
  transition: 0.2s;
}

.button:hover {
  background: #fff;
  color: #000;
}

/* Pop button on side */
.side {
  position: fixed;
  right: 40px;
  bottom: 40px;
  text-align: center;
}

.pop {
  margin-top: 8px;
  padding: 10px 18px;
  border: 1px solid #fff;
  background: none;
  color: #fff;
  cursor: pointer;
  transition: transform 0.1s;
}

.pop:active {
  transform: scale(1.2);
}

/* Tiny corner "a" */
.corner-a {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 12px;
  color: #888;
  cursor: pointer;
}

.corner-a:hover {
  color: #fff;
}
</style>
</head>

<body>

<!-- Tiny corner link -->
<div class="corner-a" onclick="window.location='contact.html'">a</div>

<div class="container">
  <h1>tex totten</h1>
  <a class="button" href="https://linktr.ee/tex23">linktree</a>
  <div class="quote">
    "Before you criticize someone, you should walk a mile in their shoes. That way when you criticize them, you are a mile away from them and you have their shoes."
  </div>
</div>
